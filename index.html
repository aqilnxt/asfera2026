<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asfera 2026 - Steampunk Festival</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/images/favicon/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/images/favicon/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="/images/favicon/site.webmanifest" />
  </head>
  <body>
    <nav class="fixed top-12 left-0 right-0 z-50">
      <div class="flex items-center h-20">
        <!-- Menu Kiri dengan Background (grow untuk mengisi ruang) -->
        <div
          class="flex items-center gap-6 px-8 bg-linear-to-r from-sky-900 to-sky-700 h-full rounded-r-3xl grow justify-around"
        >
          <a
            href="#home"
            class="text-white hover:text-amber-400 transition-colors font-medium"
            >Home</a
          >
          <a
            href="#about"
            class="text-white hover:text-amber-400 transition-colors font-medium"
            >About</a
          >
          <a
            href="#events"
            class="text-white hover:text-amber-400 transition-colors font-medium"
            >Events</a
          >
        </div>

        <!-- Logo Tengah (FIXED WIDTH) -->
        <div class="flex justify-center items-center h-full shrink-0">
          <img
            src="/images/logo/asfera-icon.webp"
            alt="Asfera Logo"
            class="h-44 w-auto"
          />
        </div>

        <!-- Menu Kanan dengan Background (grow untuk mengisi ruang) -->
        <div
          class="flex items-center gap-6 px-8 bg-linear-to-l from-sky-900 to-sky-700 h-full rounded-l-3xl grow justify-around"
        >
          <a
            href="#competitions"
            class="text-white hover:text-amber-400 transition-colors font-medium"
            >Competitions</a
          >
          <a
            href="#faq"
            class="text-white hover:text-amber-400 transition-colors font-medium"
            >FAQ</a
          >
          <a
            href="#contact"
            class="text-white hover:text-amber-400 transition-colors font-medium"
            >Contact</a
          >
        </div>
      </div>
    </nav>

    <!-- ============================================
         HERO SECTION
    ============================================ -->
    <section
      id="hero"
      class="relative min-h-screen flex items-center justify-center pt-20 px-4 sm:px-6 lg:px-8 bg-dark-navy bg-cover bg-center bg-no-repeat bg-fixed"
      style="background-image: url('/images/backgrounds/bg-hero.png')"
    >
      <!-- Dark Overlay -->
      <div class="absolute inset-0 bg-hero-overlay z-10"></div>

      <!-- Corner Gear Decorations -->
      <div
        class="absolute top-24 left-5 w-24 h-24 sm:w-32 sm:h-32 lg:w-40 lg:h-40 opacity-60 z-10"
      >
        <img
          src="./assets/images/decorations/gear-corner.png"
          alt="Gear"
          class="w-full h-full object-contain animate-gear"
        />
      </div>
      <div
        class="absolute top-24 right-5 w-24 h-24 sm:w-32 sm:h-32 lg:w-40 lg:h-40 opacity-60 z-10"
      >
        <img
          src="./assets/images/decorations/gear-corner.png"
          alt="Gear"
          class="w-full h-full object-contain animate-gear-reverse"
        />
      </div>
      <div
        class="absolute bottom-12 left-5 w-24 h-24 sm:w-32 sm:h-32 lg:w-40 lg:h-40 opacity-60 z-10"
      >
        <img
          src="./assets/images/decorations/gear-corner.png"
          alt="Gear"
          class="w-full h-full object-contain animate-gear-reverse"
        />
      </div>
      <div
        class="absolute bottom-12 right-5 w-24 h-24 sm:w-32 sm:h-32 lg:w-40 lg:h-40 opacity-60 z-10"
      >
        <img
          src="./assets/images/decorations/gear-corner.png"
          alt="Gear"
          class="w-full h-full object-contain animate-gear"
        />
      </div>

      <!-- Hero Content Container -->
      <div class="relative z-20 text-center max-w-4xl mx-auto">
        <!-- Logo ASFERA -->
        <div class="mb-8 animate-fade-in-down">
          <img
            src="/images/logo/asfera-logo.png"
            alt="Asfera Logo"
            class="w-full max-w-md sm:max-w-lg mx-auto drop-shadow-[0_0_20px_rgba(184,134,11,0.5)]"
          />
        </div>

        <!-- Subtitle -->
        <p
          class="font-heading text-xl sm:text-2xl lg:text-3xl text-[#f4e4c1] mb-16 tracking-[0.2em] drop-shadow-[2px_2px_8px_rgba(0,0,0,0.8)] animate-fade-in-up"
          style="animation-delay: 0.3s; animation-fill-mode: both"
        >
          ⚙ STEAMPUNK FESTIVAL ⚙
        </p>

        <!-- Spacer -->
        <div class="h-8"></div>

        <!-- Countdown Timer -->
        <div
          class="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4 lg:gap-6 mb-16 animate-fade-in-up"
          style="animation-delay: 0.6s; animation-fill-mode: both"
        >
          <!-- Days -->
          <div
            class="bg-countdown-gradient border-3 border-brass rounded-2xl p-4 sm:p-6 lg:p-8 shadow-[0_8px_20px_rgba(0,0,0,0.6),inset_0_1px_0_rgba(184,134,11,0.2)] transition-all duration-300 hover:-translate-y-2 hover:border-copper hover:shadow-[0_12px_30px_rgba(184,134,11,0.4)]"
          >
            <div
              id="days"
              class="font-heading text-4xl sm:text-5xl lg:text-6xl font-bold text-brass drop-shadow-[2px_2px_4px_rgba(0,0,0,0.8)] mb-2"
            >
              00
            </div>
            <div
              class="font-ui text-xs sm:text-sm text-[#f4e4c1] uppercase tracking-widest font-semibold"
            >
              DAYS
            </div>
          </div>

          <!-- Hours -->
          <div
            class="bg-countdown-gradient border-3 border-brass rounded-2xl p-4 sm:p-6 lg:p-8 shadow-[0_8px_20px_rgba(0,0,0,0.6),inset_0_1px_0_rgba(184,134,11,0.2)] transition-all duration-300 hover:-translate-y-2 hover:border-copper hover:shadow-[0_12px_30px_rgba(184,134,11,0.4)]"
          >
            <div
              id="hours"
              class="font-heading text-4xl sm:text-5xl lg:text-6xl font-bold text-brass drop-shadow-[2px_2px_4px_rgba(0,0,0,0.8)] mb-2"
            >
              00
            </div>
            <div
              class="font-ui text-xs sm:text-sm text-[#f4e4c1] uppercase tracking-widest font-semibold"
            >
              HOURS
            </div>
          </div>

          <!-- Minutes -->
          <div
            class="bg-countdown-gradient border-3 border-brass rounded-2xl p-4 sm:p-6 lg:p-8 shadow-[0_8px_20px_rgba(0,0,0,0.6),inset_0_1px_0_rgba(184,134,11,0.2)] transition-all duration-300 hover:-translate-y-2 hover:border-copper hover:shadow-[0_12px_30px_rgba(184,134,11,0.4)]"
          >
            <div
              id="minutes"
              class="font-heading text-4xl sm:text-5xl lg:text-6xl font-bold text-brass drop-shadow-[2px_2px_4px_rgba(0,0,0,0.8)] mb-2"
            >
              00
            </div>
            <div
              class="font-ui text-xs sm:text-sm text-[#f4e4c1] uppercase tracking-widest font-semibold"
            >
              MINUTE
            </div>
          </div>

          <!-- Seconds -->
          <div
            class="bg-countdown-gradient border-3 border-brass rounded-2xl p-4 sm:p-6 lg:p-8 shadow-[0_8px_20px_rgba(0,0,0,0.6),inset_0_1px_0_rgba(184,134,11,0.2)] transition-all duration-300 hover:-translate-y-2 hover:border-copper hover:shadow-[0_12px_30px_rgba(184,134,11,0.4)]"
          >
            <div
              id="seconds"
              class="font-heading text-4xl sm:text-5xl lg:text-6xl font-bold text-brass drop-shadow-[2px_2px_4px_rgba(0,0,0,0.8)] mb-2"
            >
              00
            </div>
            <div
              class="font-ui text-xs sm:text-sm text-[#f4e4c1] uppercase tracking-widest font-semibold"
            >
              SECOND
            </div>
          </div>
        </div>

        <!-- Spacer -->
        <div class="h-12"></div>

        <!-- CTA Button -->
        <a
          href="https://docs.google.com/forms/d/e/1FAIpQLSfFp3hp34RTl7bORSnJ2LVV5tVxqZSSyxeabpiVEwuApmK46g/viewform"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-block px-8 sm:px-12 py-4 bg-btn-gradient text-dark-navy font-ui font-bold text-base sm:text-lg uppercase tracking-[0.15em] rounded-full border-2 border-copper shadow-[0_6px_20px_rgba(184,134,11,0.4),inset_0_1px_0_rgba(255,255,255,0.2)] transition-all duration-300 hover:-translate-y-1 hover:scale-105 hover:shadow-[0_10px_30px_rgba(184,134,11,0.6)] hover:border-brass relative overflow-hidden group animate-fade-in-up"
          style="animation-delay: 0.9s; animation-fill-mode: both"
        >
          <span class="relative z-10">⚙ DAFTAR SEKARANG ⚙</span>
          <span
            class="absolute inset-0 bg-white/20 rounded-full scale-0 group-hover:scale-150 transition-transform duration-500"
          ></span>
        </a>
      </div>
    </section>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
